services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Variables públicas: se incrustan en el bundle en tiempo de build
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: cerraduras-tucuman:latest
    container_name: cerraduras-tucuman
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Públicas (también en runtime por si acaso)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      # Secretas (solo runtime, nunca en el bundle)
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      CRON_SECRET: ${CRON_SECRET}
